<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeartMirror 心镜</title>
  <script>
    // SPA Fallback for GitHub Pages
    // 将所有路由重定向到 index.html，保留路径信息
    var pathSegmentsToKeep = 1; // 保留 /HeartMirror 路径段
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
      '/?/' + l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/') +
      l.search +
      l.hash
    );
  </script>
</head>
<body>
  <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #f5f5f5; font-family: system-ui, sans-serif;">
    <p style="color: #666;">正在加载 HeartMirror 心镜...</p>
  </div>
</body>
</html>
