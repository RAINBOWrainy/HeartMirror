# Render Blueprint for HeartMirror
# https://render.com/docs/blueprint-spec

services:
  # Web Service - 后端API
  - type: web
    name: heartmirror-backend
    env: python
    region: singapore
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: heartmirror-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["http://localhost:5173","http://localhost:3000","https://rainbowrainy.github.io","https://heartmirror-demo.vercel.app"]'
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL
        value: z-ai/glm-4.5-air:free
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: USE_BERT_MODEL
        value: false

databases:
  # PostgreSQL Database
  - name: heartmirror-db
    databaseName: heartmirror
    user: heartmirror
    region: singapore
    plan: free