name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: DEPLOY_MODE=local npx prisma generate

      - name: Run tests
        run: npm test

      - name: Run linter
        run: npm run lint

  build-web:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Copy Prisma schema for local mode
        run: cp prisma/schema-local.prisma prisma/schema.prisma
        shell: bash

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js app
        run: npm run build
        env:
          DEPLOY_MODE: local

      - name: Create web app archive
        run: |
          mkdir -p release
          cp -r .next release/
          cp package.json release/
          cp README.md release/
          cd release && tar -czf ../heartmirror-web-app.tar.gz .

      - name: Upload web app artifact
        uses: actions/upload-artifact@v4
        with:
          name: heartmirror-web-app
          path: heartmirror-web-app.tar.gz

  release:
    needs: build-web
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download web app artifact
        uses: actions/download-artifact@v4
        with:
          name: heartmirror-web-app

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: HeartMirror ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            heartmirror-web-app.tar.gz
          body: |
            ## HeartMirror - AI companion for 2AM spiraling

            ### What's New
            - Local mode with full privacy protection
            - All conversations end-to-end encrypted
            - Support for all OpenAI-compatible AI providers
            - PWA support - install on your phone
            - Multiple conversation threads
            - Export/Import for data migration

            ### Installation

            **Web App (Recommended):**
            1. Download `heartmirror-web-app.tar.gz`
            2. Extract and run `npm install && npm start`
            3. Open http://localhost:3003 in your browser

            **Desktop App (Coming Soon):**
            Tauri-based desktop app is in development. See README for setup instructions.
